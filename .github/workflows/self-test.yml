# Self-test workflow.
#
# Calls the action against `libspatialite` (a non-trivial port with several
# transitive dependencies — proj, geos, sqlite3, libcurl, libxml2, ...) on
# windows-latest in vcpkg manifest mode (`tests/manifest/vcpkg.json`). The
# first run cold-builds and populates the GitHub Packages NuGet feed under
# this repo's owner; subsequent runs verify per-port cache hits.
#
# Trigger model:
#   - workflow_dispatch: ad-hoc smoke / cache refresh
#   - push to main: regression check after action.yml changes
#   - pull_request: build-only verification (no NuGet publish — fork PRs
#     don't get packages:write on GITHUB_TOKEN; we run with mode: read here
#     to avoid 401s)

name: self-test

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'action.yml'
      - 'tests/manifest/vcpkg.json'
      - '.github/workflows/self-test.yml'
  pull_request:
    branches: [main]
    paths:
      - 'action.yml'
      - 'tests/manifest/vcpkg.json'
      - '.github/workflows/self-test.yml'

concurrency:
  group: self-test-${{ github.ref }}
  cancel-in-progress: true

env:
  # Same SHA as tests/manifest/vcpkg.json's builtin-baseline so the tool
  # and the resolved port versions stay in sync.
  VCPKG_PIN: 84bab45d415d22042bd0b9081aea57f362da3f35

jobs:
  windows-publish:
    if: github.event_name != 'pull_request'
    name: windows publish (manifest mode, libspatialite)
    runs-on: windows-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Run setup-vcpkg-nuget-cache (publisher mode)
        uses: ./
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          vcpkg-commit: ${{ env.VCPKG_PIN }}
      - name: vcpkg install (manifest mode)
        working-directory: tests/manifest
        shell: pwsh
        run: vcpkg install --triplet=x64-windows-static-md

  windows-read-only:
    if: github.event_name == 'pull_request'
    name: windows read-only (manifest mode, libspatialite)
    runs-on: windows-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
      - name: Run setup-vcpkg-nuget-cache (consumer mode)
        uses: ./
        with:
          mode: read
          token: ${{ secrets.GITHUB_TOKEN }}
          vcpkg-commit: ${{ env.VCPKG_PIN }}
      - name: Verify env was exported and vcpkg pin took effect
        shell: pwsh
        run: |
          if (-not $env:VCPKG_BINARY_SOURCES) {
            Write-Error "VCPKG_BINARY_SOURCES was not exported"
            exit 1
          }
          Write-Host "VCPKG_BINARY_SOURCES = $env:VCPKG_BINARY_SOURCES"

          $head = (git -C "$env:VCPKG_ROOT" rev-parse HEAD).Trim()
          if ($head -ne $env:VCPKG_PIN) {
            Write-Error "vcpkg HEAD = $head, expected $env:VCPKG_PIN"
            exit 1
          }
          Write-Host "vcpkg pinned to $head"
      - name: vcpkg install (manifest mode, read-only)
        working-directory: tests/manifest
        shell: pwsh
        run: vcpkg install --triplet=x64-windows-static-md
