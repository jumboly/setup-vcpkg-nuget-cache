name: 'Setup vcpkg NuGet Cache'
description: 'Configure vcpkg to use a GitHub Packages NuGet feed as a binary cache. Pins vcpkg to the SHA from your vcpkg.json builtin-baseline (or to an explicit override).'
author: 'jumboly'
branding:
  icon: 'package'
  color: 'blue'

inputs:
  token:
    description: >
      GitHub token with packages:write (for publish) or packages:read (for consume-only).
      secrets.GITHUB_TOKEN works when publishing within the same owner as the calling repo.
      Cross-owner publish or read requires a Personal Access Token.
    required: true
  mode:
    description: '`read` (consumer-only) or `readwrite` (publisher).'
    required: false
    default: 'readwrite'
  vcpkg-commit:
    description: >
      Explicit microsoft/vcpkg commit SHA to pin the local checkout to. Overrides
      `manifest-path` auto-detection. Tags or branch names also work, but commit
      SHAs are recommended for reproducibility. Leave empty to read the SHA from
      vcpkg.json's `builtin-baseline` field.
    required: false
    default: ''
  manifest-path:
    description: >
      Path to vcpkg.json. The action reads its `builtin-baseline` field as the
      pin SHA when `vcpkg-commit` is not set. Default: `./vcpkg.json`.
    required: false
    default: './vcpkg.json'
  feed-url:
    description: >
      NuGet feed URL. Default: GitHub Packages of the calling repository owner
      (https://nuget.pkg.github.com/<owner>/index.json).
    required: false
    default: ''
  feed-name:
    description: 'Internal NuGet source key. Used by `nuget sources add`.'
    required: false
    default: 'github-packages'
  vcpkg-root:
    description: >
      Path to vcpkg installation. Default resolution: $VCPKG_INSTALLATION_ROOT,
      then $VCPKG_ROOT, then C:/vcpkg.
    required: false
    default: ''

outputs:
  feed-url:
    description: 'Resolved feed URL.'
    value: ${{ steps.setup.outputs.feed-url }}
  vcpkg-root:
    description: 'Resolved vcpkg root path.'
    value: ${{ steps.setup.outputs.vcpkg-root }}
  vcpkg-commit:
    description: 'SHA the vcpkg checkout was pinned to (auto-resolved or from input).'
    value: ${{ steps.setup.outputs.vcpkg-commit }}

runs:
  using: composite
  steps:
    # This action is a thin wrapper around tools/Setup-VcpkgCache.ps1.
    # Keeping the logic in a separate script (rather than inline bash)
    # means local developers can invoke the exact same code path
    # directly — no opportunity for CI and local setup to drift.
    #
    # Inputs are passed via env (not via ${{ }} substitution into the
    # script body) to prevent any chance of PowerShell expression
    # injection from a malicious input value.
    - name: Setup vcpkg NuGet cache
      id: setup
      shell: pwsh
      env:
        INPUT_TOKEN: ${{ inputs.token }}
        INPUT_MODE: ${{ inputs.mode }}
        INPUT_VCPKG_COMMIT: ${{ inputs.vcpkg-commit }}
        INPUT_MANIFEST_PATH: ${{ inputs.manifest-path }}
        INPUT_FEED_URL: ${{ inputs.feed-url }}
        INPUT_FEED_NAME: ${{ inputs.feed-name }}
        INPUT_VCPKG_ROOT: ${{ inputs.vcpkg-root }}
        GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
      run: |
        if ($env:RUNNER_OS -ne 'Windows') {
          Write-Host "::error::This action supports windows-* runners only (got RUNNER_OS=$env:RUNNER_OS)."
          exit 1
        }
        & "${{ github.action_path }}/tools/Setup-VcpkgCache.ps1" `
          -Token        $env:INPUT_TOKEN `
          -Mode         $env:INPUT_MODE `
          -VcpkgCommit  $env:INPUT_VCPKG_COMMIT `
          -ManifestPath $env:INPUT_MANIFEST_PATH `
          -FeedUrl      $env:INPUT_FEED_URL `
          -FeedName     $env:INPUT_FEED_NAME `
          -VcpkgRoot    $env:INPUT_VCPKG_ROOT `
          -Owner        $env:GITHUB_REPOSITORY_OWNER
