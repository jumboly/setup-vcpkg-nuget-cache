name: 'Setup vcpkg NuGet Cache'
description: 'Configure vcpkg to use a GitHub Packages NuGet feed as a binary cache. Manifest-mode only.'
author: 'jumboly'
branding:
  icon: 'package'
  color: 'blue'

inputs:
  feed-url:
    description: >
      NuGet feed URL. Default: GitHub Packages of the calling repository owner
      (https://nuget.pkg.github.com/<owner>/index.json).
    required: false
    default: ''
  feed-name:
    description: 'Internal NuGet source key. Used by `nuget sources add`.'
    required: false
    default: 'github-packages'
  token:
    description: >
      GitHub token with packages:write permission (for publish) or packages:read (for consume-only).
      The job's secrets.GITHUB_TOKEN works when publishing within the same owner as the calling repo.
      Cross-owner publish or read requires a Personal Access Token.
    required: true
  vcpkg-root:
    description: >
      Path to vcpkg installation. Default resolution: $VCPKG_INSTALLATION_ROOT, then $VCPKG_ROOT,
      then C:/vcpkg.
    required: false
    default: ''
  vcpkg-commit:
    description: >
      git commit SHA of microsoft/vcpkg to pin the local checkout to. When set, the action runs
      `git fetch && git checkout <sha>` in `vcpkg-root` and re-bootstraps vcpkg.exe so port
      versions stay deterministic across runner image refreshes. Tag or branch names also work,
      but commit SHAs are recommended for reproducibility. Leave empty to use whatever the
      runner already has installed.
    required: false
    default: ''
  mode:
    description: '`read` (consumer only) or `readwrite` (publisher).'
    required: false
    default: 'readwrite'

outputs:
  feed-url:
    description: 'Resolved feed URL.'
    value: ${{ steps.resolve.outputs.feed-url }}
  vcpkg-root:
    description: 'Resolved vcpkg root path.'
    value: ${{ steps.resolve.outputs.vcpkg-root }}

runs:
  using: composite
  steps:
    # ─────────────────────────────────────────────────────────────────────
    # Step 1: Resolve defaults
    # ─────────────────────────────────────────────────────────────────────
    - name: Resolve defaults
      id: resolve
      shell: bash
      env:
        INPUT_FEED_URL: ${{ inputs.feed-url }}
        INPUT_VCPKG_ROOT: ${{ inputs.vcpkg-root }}
        INPUT_MODE: ${{ inputs.mode }}
        OWNER: ${{ github.repository_owner }}
      run: |
        set -euo pipefail

        # This action targets windows-* runners. Linux/macOS are out of scope:
        # nuget.exe needs Mono on those platforms and binary caching for
        # Windows-targeted MSVC builds is the design centre.
        if [ "$RUNNER_OS" != "Windows" ]; then
          echo "::error::This action supports windows-* runners only (got RUNNER_OS=$RUNNER_OS)."
          exit 1
        fi

        # Reject typos in `mode` early — a bad value silently propagates into
        # VCPKG_BINARY_SOURCES and disables binary caching with no error.
        case "$INPUT_MODE" in
          read|readwrite) ;;
          *) echo "::error::invalid mode '$INPUT_MODE' (must be 'read' or 'readwrite')"; exit 1 ;;
        esac

        FEED_URL="$INPUT_FEED_URL"
        if [ -z "$FEED_URL" ]; then
          FEED_URL="https://nuget.pkg.github.com/${OWNER}/index.json"
        fi
        echo "feed-url=$FEED_URL" >> "$GITHUB_OUTPUT"

        VCPKG_R="$INPUT_VCPKG_ROOT"
        if [ -z "$VCPKG_R" ]; then
          VCPKG_R="${VCPKG_INSTALLATION_ROOT:-${VCPKG_ROOT:-}}"
        fi
        if [ -z "$VCPKG_R" ]; then
          # Forward-slash form is safe under Git Bash on windows-latest, where
          # the default vcpkg install lives at C:\vcpkg.
          VCPKG_R="C:/vcpkg"
        fi
        echo "vcpkg-root=$VCPKG_R" >> "$GITHUB_OUTPUT"
        echo "VCPKG_BIN=$VCPKG_R/vcpkg.exe" >> "$GITHUB_ENV"

    # ─────────────────────────────────────────────────────────────────────
    # Step 2: Verify vcpkg installation (and optionally pin to a commit)
    # ─────────────────────────────────────────────────────────────────────
    # Without `vcpkg-commit`, this step only checks that vcpkg.exe exists at
    # the resolved root — bootstrap is the caller's responsibility (the
    # windows-latest runner image ships a working vcpkg at C:\vcpkg).
    #
    # With `vcpkg-commit`, this step pins the vcpkg ports tree to a specific
    # SHA (or tag/branch) so port versions — and therefore abi-hashes and
    # NuGet cache keys — stay deterministic across runner image refreshes.
    # We re-run bootstrap-vcpkg.bat after checkout because the existing
    # vcpkg.exe may not match the checked-out scripts.
    - name: Verify vcpkg installation
      shell: bash
      env:
        VCPKG_R: ${{ steps.resolve.outputs.vcpkg-root }}
        VCPKG_COMMIT: ${{ inputs.vcpkg-commit }}
      run: |
        set -euo pipefail

        if [ ! -d "$VCPKG_R" ]; then
          echo "::error::vcpkg directory not found at $VCPKG_R. Bootstrap vcpkg before calling this action."
          exit 1
        fi

        if [ -n "$VCPKG_COMMIT" ]; then
          if [ ! -d "$VCPKG_R/.git" ]; then
            echo "::error::vcpkg-commit was set but $VCPKG_R is not a git tree (no .git/ found). Cannot pin."
            exit 1
          fi
          # Full fetch: pinned SHAs may be on branches we are not tracking
          # locally yet (e.g. an older release commit not on master HEAD).
          git -C "$VCPKG_R" fetch --tags origin
          git -C "$VCPKG_R" checkout --detach "$VCPKG_COMMIT"
          # bootstrap-vcpkg.bat is a Windows batch file; invoke via cmd.exe
          # under Git Bash. -disableMetrics suppresses the telemetry prompt.
          if ! cmd.exe //c "$(cygpath -w "$VCPKG_R/bootstrap-vcpkg.bat") -disableMetrics"; then
            echo "::error::bootstrap-vcpkg.bat failed. Check vcpkg-commit value: $VCPKG_COMMIT"
            exit 1
          fi
        fi

        if [ ! -f "$VCPKG_BIN" ]; then
          if [ -n "$VCPKG_COMMIT" ]; then
            echo "::error::vcpkg.exe not found at $VCPKG_BIN after bootstrap. Inspect bootstrap log above."
          else
            echo "::error::vcpkg not found at $VCPKG_BIN. Bootstrap vcpkg before calling this action."
          fi
          exit 1
        fi
        echo "VCPKG_ROOT=$VCPKG_R" >> "$GITHUB_ENV"

    # ─────────────────────────────────────────────────────────────────────
    # Step 3: Fetch nuget.exe via vcpkg
    # ─────────────────────────────────────────────────────────────────────
    # `vcpkg fetch nuget` downloads/locates a known-good nuget.exe and prints
    # its absolute path on the last line of stdout. We capture that path.
    - name: Fetch nuget.exe via vcpkg
      shell: bash
      run: |
        set -euo pipefail
        # `vcpkg fetch nuget` may print progress lines or blank lines; the
        # nuget.exe path is always the last non-empty line of stdout.
        NUGET_EXE="$("$VCPKG_BIN" fetch nuget 2>/dev/null | awk 'NF{p=$0} END{print p}')"
        if [ -z "$NUGET_EXE" ] || [ ! -f "$NUGET_EXE" ]; then
          echo "::error::vcpkg fetch nuget did not produce a usable path"
          exit 1
        fi
        echo "NUGET_EXE=$NUGET_EXE" >> "$GITHUB_ENV"

    # ─────────────────────────────────────────────────────────────────────
    # Step 4: Configure NuGet source
    # ─────────────────────────────────────────────────────────────────────
    # `-StorePasswordInClearText` skips DPAPI encryption — required so that
    # vcpkg (running as a separate process) can decrypt the credential on
    # subsequent invocations. The `-Username` field is opaque to GitHub
    # Packages — any non-empty string works; we pass the owner for trace.
    - name: Configure NuGet source
      shell: bash
      env:
        FEED_URL: ${{ steps.resolve.outputs.feed-url }}
        FEED_NAME: ${{ inputs.feed-name }}
        TOKEN: ${{ inputs.token }}
        OWNER: ${{ github.repository_owner }}
      run: |
        set -euo pipefail
        # Defense in depth: ensure the token is masked even if a downstream
        # tool unexpectedly echoes it.
        echo "::add-mask::$TOKEN"

        # Idempotent: drop any prior registration with the same name so
        # repeated invocations within a job do not error out.
        "$NUGET_EXE" sources remove -Name "$FEED_NAME" 2>/dev/null || true
        "$NUGET_EXE" sources add \
          -Name "$FEED_NAME" \
          -Source "$FEED_URL" \
          -Username "$OWNER" \
          -Password "$TOKEN" \
          -StorePasswordInClearText
        "$NUGET_EXE" setapikey "$TOKEN" -Source "$FEED_URL"

    # ─────────────────────────────────────────────────────────────────────
    # Step 5: Export VCPKG_BINARY_SOURCES
    # ─────────────────────────────────────────────────────────────────────
    # `clear` resets vcpkg's default binary sources (which include the local
    # files cache) and replaces them with our nuget feed only. To keep the
    # local files cache as a fallback, drop `clear` and use
    # `default,read;nuget,...,readwrite` instead.
    - name: Export VCPKG_BINARY_SOURCES
      shell: bash
      env:
        FEED_URL: ${{ steps.resolve.outputs.feed-url }}
        MODE: ${{ inputs.mode }}
      run: |
        set -euo pipefail
        echo "VCPKG_BINARY_SOURCES=clear;nuget,${FEED_URL},${MODE}" >> "$GITHUB_ENV"

