name: 'Setup vcpkg NuGet Cache'
description: 'Configure vcpkg to use a GitHub Packages NuGet feed as a binary cache, and (optionally) install ports.'
author: 'jumboly'
branding:
  icon: 'package'
  color: 'blue'

inputs:
  ports:
    description: >
      Comma-separated list of vcpkg ports to install (e.g. "libspatialite,boost-system").
      Leave empty to perform NuGet env setup only (the caller will run `vcpkg install` themselves).
    required: false
    default: ''
  triplet:
    description: >
      vcpkg triplet (e.g. "x64-windows-static-md", "x64-linux"). Required when `ports` is non-empty.
    required: false
    default: ''
  feed-url:
    description: >
      NuGet feed URL. Default: GitHub Packages of the calling repository owner
      (https://nuget.pkg.github.com/<owner>/index.json).
    required: false
    default: ''
  feed-name:
    description: 'Internal NuGet source key. Used by `nuget sources add`.'
    required: false
    default: 'github-packages'
  token:
    description: >
      GitHub token with packages:write permission (for publish) or packages:read (for consume-only).
      The job's secrets.GITHUB_TOKEN works when publishing within the same owner as the calling repo.
      Cross-owner publish or read requires a Personal Access Token.
    required: true
  vcpkg-root:
    description: >
      Path to vcpkg installation. Default resolution: $VCPKG_INSTALLATION_ROOT, then $VCPKG_ROOT,
      then C:\vcpkg on Windows / /usr/local/share/vcpkg on Linux/macOS.
    required: false
    default: ''
  mode:
    description: '`read` (consumer only) or `readwrite` (publisher).'
    required: false
    default: 'readwrite'

outputs:
  feed-url:
    description: 'Resolved feed URL.'
    value: ${{ steps.resolve.outputs.feed-url }}
  vcpkg-root:
    description: 'Resolved vcpkg root path.'
    value: ${{ steps.resolve.outputs.vcpkg-root }}

runs:
  using: composite
  steps:
    # ─────────────────────────────────────────────────────────────────────
    # Step 1: Resolve defaults
    # ─────────────────────────────────────────────────────────────────────
    - name: Resolve defaults
      id: resolve
      shell: bash
      env:
        INPUT_FEED_URL: ${{ inputs.feed-url }}
        INPUT_VCPKG_ROOT: ${{ inputs.vcpkg-root }}
        OWNER: ${{ github.repository_owner }}
      run: |
        set -euo pipefail

        FEED_URL="$INPUT_FEED_URL"
        if [ -z "$FEED_URL" ]; then
          FEED_URL="https://nuget.pkg.github.com/${OWNER}/index.json"
        fi
        echo "feed-url=$FEED_URL" >> "$GITHUB_OUTPUT"

        VCPKG_R="$INPUT_VCPKG_ROOT"
        if [ -z "$VCPKG_R" ]; then
          VCPKG_R="${VCPKG_INSTALLATION_ROOT:-${VCPKG_ROOT:-}}"
        fi
        if [ -z "$VCPKG_R" ]; then
          # Forward-slash form is safe under Git Bash on windows-latest, where
          # the default vcpkg install lives at C:\vcpkg.
          if [ "$RUNNER_OS" = "Windows" ]; then
            VCPKG_R="C:/vcpkg"
          else
            VCPKG_R="/usr/local/share/vcpkg"
          fi
        fi
        echo "vcpkg-root=$VCPKG_R" >> "$GITHUB_OUTPUT"

    # ─────────────────────────────────────────────────────────────────────
    # Step 2: Verify vcpkg installation
    # ─────────────────────────────────────────────────────────────────────
    - name: Verify vcpkg installation
      shell: bash
      env:
        VCPKG_R: ${{ steps.resolve.outputs.vcpkg-root }}
      run: |
        set -euo pipefail
        if [ ! -x "$VCPKG_R/vcpkg" ] && [ ! -f "$VCPKG_R/vcpkg.exe" ]; then
          echo "::error::vcpkg not found at $VCPKG_R. Bootstrap vcpkg before calling this action."
          exit 1
        fi
        echo "VCPKG_ROOT=$VCPKG_R" >> "$GITHUB_ENV"

    # ─────────────────────────────────────────────────────────────────────
    # Step 3: Fetch nuget.exe via vcpkg
    # ─────────────────────────────────────────────────────────────────────
    # `vcpkg fetch nuget` downloads/locates a known-good nuget.exe and prints
    # its absolute path on the last line of stdout. We capture that path; it
    # works on Windows / Linux / macOS uniformly.
    #
    # On non-Windows, nuget.exe needs Mono. ubuntu-latest has mono pre-installed;
    # macos-latest does NOT — call sites need `brew install mono` or this action
    # will fail at the `nuget sources add` step.
    - name: Fetch nuget.exe via vcpkg
      shell: bash
      env:
        VCPKG_R: ${{ steps.resolve.outputs.vcpkg-root }}
      run: |
        set -euo pipefail
        if [ "$RUNNER_OS" = "Windows" ]; then
          VCPKG_BIN="$VCPKG_R/vcpkg.exe"
        else
          VCPKG_BIN="$VCPKG_R/vcpkg"
        fi
        # `vcpkg fetch nuget` may print progress lines or blank lines; the
        # nuget.exe path is always the last non-empty line of stdout.
        NUGET_EXE="$("$VCPKG_BIN" fetch nuget 2>/dev/null | awk 'NF{p=$0} END{print p}')"
        if [ -z "$NUGET_EXE" ] || [ ! -f "$NUGET_EXE" ]; then
          echo "::error::vcpkg fetch nuget did not produce a usable path"
          exit 1
        fi
        echo "NUGET_EXE=$NUGET_EXE" >> "$GITHUB_ENV"

    # ─────────────────────────────────────────────────────────────────────
    # Step 4: Configure NuGet source
    # ─────────────────────────────────────────────────────────────────────
    # `-StorePasswordInClearText` is required on non-Windows runners (no
    # Windows credential store) and harmless on Windows. The username field is
    # opaque to GitHub Packages — any non-empty string works.
    - name: Configure NuGet source
      shell: bash
      env:
        FEED_URL: ${{ steps.resolve.outputs.feed-url }}
        FEED_NAME: ${{ inputs.feed-name }}
        TOKEN: ${{ inputs.token }}
        OWNER: ${{ github.repository_owner }}
      run: |
        set -euo pipefail
        # Defense in depth: ensure the token is masked even if a downstream
        # tool unexpectedly echoes it.
        echo "::add-mask::$TOKEN"

        if [ "$RUNNER_OS" = "Windows" ]; then
          NUGET_RUN=("$NUGET_EXE")
        else
          NUGET_RUN=(mono "$NUGET_EXE")
        fi
        # Idempotent: drop any prior registration with the same name so
        # repeated invocations within a job do not error out.
        "${NUGET_RUN[@]}" sources remove -Name "$FEED_NAME" 2>/dev/null || true
        "${NUGET_RUN[@]}" sources add \
          -Name "$FEED_NAME" \
          -Source "$FEED_URL" \
          -Username "$OWNER" \
          -Password "$TOKEN" \
          -StorePasswordInClearText
        "${NUGET_RUN[@]}" setapikey "$TOKEN" -Source "$FEED_URL"

    # ─────────────────────────────────────────────────────────────────────
    # Step 5: Export VCPKG_BINARY_SOURCES
    # ─────────────────────────────────────────────────────────────────────
    # `clear` resets vcpkg's default binary sources (which include the local
    # files cache) and replaces them with our nuget feed only. To keep the
    # local files cache as a fallback, drop `clear` and use
    # `default,read;nuget,...,readwrite` instead.
    - name: Export VCPKG_BINARY_SOURCES
      shell: bash
      env:
        FEED_URL: ${{ steps.resolve.outputs.feed-url }}
        MODE: ${{ inputs.mode }}
      run: |
        set -euo pipefail
        echo "VCPKG_BINARY_SOURCES=clear;nuget,${FEED_URL},${MODE}" >> "$GITHUB_ENV"

    # ─────────────────────────────────────────────────────────────────────
    # Step 6: vcpkg install (only when ports is non-empty)
    # ─────────────────────────────────────────────────────────────────────
    - name: vcpkg install
      if: inputs.ports != ''
      shell: bash
      env:
        PORTS: ${{ inputs.ports }}
        TRIPLET: ${{ inputs.triplet }}
        VCPKG_R: ${{ steps.resolve.outputs.vcpkg-root }}
      run: |
        set -euo pipefail
        if [ -z "$TRIPLET" ]; then
          echo "::error::triplet input is required when ports is non-empty"
          exit 1
        fi
        if [ "$RUNNER_OS" = "Windows" ]; then
          VCPKG_BIN="$VCPKG_R/vcpkg.exe"
        else
          VCPKG_BIN="$VCPKG_R/vcpkg"
        fi
        # Convert comma-separated input into an argv array, trimming whitespace.
        IFS=',' read -ra PORT_ARR <<< "$PORTS"
        TRIMMED=()
        for p in "${PORT_ARR[@]}"; do
          TRIMMED+=("$(echo "$p" | tr -d '[:space:]')")
        done
        "$VCPKG_BIN" install --triplet="$TRIPLET" "${TRIMMED[@]}"
