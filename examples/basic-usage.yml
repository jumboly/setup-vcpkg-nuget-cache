# Drop-in example for a typical Windows MSVC + vcpkg job.
# This snippet replaces the actions/cache + vcpkg install steps the
# workflow would otherwise need.

name: example
on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read
      packages: write
    env:
      VCPKGRS_TRIPLET: x64-windows-static-md
    steps:
      - uses: actions/checkout@v4

      # Other setup as needed (Rust toolchain, MSVC, etc.)
      # - uses: dtolnay/rust-toolchain@stable

      - uses: jumboly/setup-vcpkg-nuget-cache@v1
        with:
          ports: libspatialite
          triplet: ${{ env.VCPKGRS_TRIPLET }}
          token: ${{ secrets.GITHUB_TOKEN }}
          # For deterministic builds across runner image refreshes, pin the
          # vcpkg ports tree to a microsoft/vcpkg release commit. Without it,
          # the runner's bundled vcpkg checkout drifts every ~2 weeks. See
          # README "Reproducibility" for details.
          # vcpkg-commit: 84bab45d415d22042bd0b9081aea57f362da3f35   # 2025.12.12

      # vcpkg-installed libraries are now available at
      # $VCPKG_INSTALLATION_ROOT/installed/x64-windows-static-md/.
      # Continue with cargo / cmake / msbuild as usual.
      # - run: cargo build --features bundled-vcpkg --verbose
