# Drop-in example for a typical Windows MSVC + vcpkg job.
#
# Prerequisite: a `vcpkg.json` at the repo root (or wherever you run
# the build from) declaring your dependencies and a builtin-baseline.
# The action reads the SHA from that file automatically.
#
#   {
#     "name": "my-app",
#     "version-string": "0.1.0",
#     "dependencies": ["libspatialite"],
#     "builtin-baseline": "84bab45d415d22042bd0b9081aea57f362da3f35"
#   }

name: example
on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # Other setup as needed (Rust toolchain, MSVC, etc.)
      # - uses: dtolnay/rust-toolchain@stable

      - uses: jumboly/setup-vcpkg-nuget-cache@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # Option A: VS integration handles `vcpkg install` for you during
      # msbuild. The action exported VCPKG_ROOT and VCPKG_BINARY_SOURCES,
      # so msbuild auto-installs deps and uses the NuGet cache.
      - name: Build
        run: msbuild MyApp.sln /p:Configuration=Release /p:Platform=x64

      # Option B: explicit vcpkg install (CMake, custom build, no VS).
      # - run: vcpkg install --triplet=x64-windows-static-md
      # - run: cmake --preset windows-msvc && cmake --build out
